<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Redirecting...</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    body {
      background-color: #17212b;
      margin: 0;
      padding: 0;
    }
  </style>
</head>
<body>
  <script>
    (function() {
      // Initialize Telegram WebApp SDK instantly
      if (window.Telegram && window.Telegram.WebApp) {
        window.Telegram.WebApp.ready();
      }

      // Fast URL parameter parser
      const fullQuery = window.location.search;
      let rawLink = null;

      if (fullQuery.includes('link=')) {
        rawLink = fullQuery.substring(fullQuery.indexOf('link=') + 5);
      } else if (fullQuery.includes('url=')) {
        rawLink = fullQuery.substring(fullQuery.indexOf('url=') + 4);
      }

      if (rawLink) {
        let targetLink = decodeURIComponent(rawLink);

        if (!targetLink.startsWith('http://') && !targetLink.startsWith('https://') && !targetLink.startsWith('tg://')) {
          targetLink = 'https://' + targetLink;
        }

        // INSTANT FORWARD (0ms Delay)
        try {
          if (window.Telegram && window.Telegram.WebApp && window.Telegram.WebApp.openTelegramLink) {
            window.Telegram.WebApp.openTelegramLink(targetLink);
          } else {
            window.location.href = targetLink;
          }
        } catch (e) {
          window.location.href = targetLink;
        }

        // AUTO-CLOSE MINI APP OVERLAY INSTANTLY
        setTimeout(function() {
          if (window.Telegram && window.Telegram.WebApp) {
            window.Telegram.WebApp.close();
          }
        }, 50);
      }
    })();
  </script>
</body>
</html>
