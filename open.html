<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Open Bot</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    body {
      background-color: #17212b;
      color: #ffffff;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 24px;
      text-align: center;
    }
    .container {
      width: 100%;
      max-width: 320px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    .icon {
      font-size: 48px;
      margin-bottom: 16px;
    }
    h2 {
      font-size: 20px;
      font-weight: 600;
      margin-bottom: 8px;
      color: #ffffff;
    }
    p {
      font-size: 14px;
      color: #708499;
      margin-bottom: 24px;
      line-height: 1.4;
    }
    .btn {
      width: 100%;
      background-color: #248bda;
      color: #ffffff;
      border: none;
      border-radius: 14px;
      padding: 16px 24px;
      font-size: 17px;
      font-weight: 600;
      cursor: pointer;
      box-shadow: 0 4px 14px rgba(36, 139, 218, 0.35);
      transition: transform 0.1s ease, background-color 0.2s ease;
      text-decoration: none;
      display: block;
    }
    .btn:active {
      transform: scale(0.98);
      background-color: #1c74b4;
    }
  </style>
</head>
<body>

  <div class="container">
    <div class="icon">🚀</div>
    <h2 id="titleText">Open Bot</h2>
    <p id="descText">Tap the button below to launch the bot directly with your referral link.</p>
    
    <a id="launchBtn" href="#" class="btn">🚀 Open Bot Now</a>
  </div>

  <script>
    // Expand Telegram WebApp SDK safely
    if (window.Telegram && window.Telegram.WebApp) {
      try {
        window.Telegram.WebApp.ready();
        window.Telegram.WebApp.expand();
      } catch(e) {}
    }

    // Convert Hex parameter back to full target URL
    function hexToStr(hex) {
      let str = '';
      for (let i = 0; i < hex.length; i += 2) {
        str += String.fromCharCode(parseInt(hex.substr(i, 2), 16));
      }
      return str;
    }

    const urlParams = new URLSearchParams(window.location.search);
    const hexTarget = urlParams.get('target');

    const launchBtn = document.getElementById('launchBtn');

    if (hexTarget) {
      let decodedUrl = hexToStr(hexTarget);
      
      if (!decodedUrl.startsWith('http://') && !decodedUrl.startsWith('https://') && !decodedUrl.startsWith('tg://')) {
        decodedUrl = 'https://' + decodedUrl;
      }

      launchBtn.href = decodedUrl;

      // User Touch Trigger
      launchBtn.addEventListener('click', function() {
        if (window.Telegram && window.Telegram.WebApp && window.Telegram.WebApp.openTelegramLink) {
          try {
            window.Telegram.WebApp.openTelegramLink(decodedUrl);
          } catch(err) {}
        }
      });
    } else {
      document.getElementById('titleText').innerText = 'No Link';
      document.getElementById('descText').innerText = 'Missing target referral parameter.';
      launchBtn.style.display = 'none';
    }
  </script>
</body>
</html>
