<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Open Bot</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    body {
      background-color: #17212b;
      color: #ffffff;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 24px;
      text-align: center;
    }
    .container {
      width: 100%;
      max-width: 340px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    .icon {
      font-size: 48px;
      margin-bottom: 16px;
    }
    h2 {
      font-size: 20px;
      font-weight: 600;
      margin-bottom: 8px;
      color: #ffffff;
    }
    p {
      font-size: 14px;
      color: #708499;
      margin-bottom: 24px;
      line-height: 1.4;
    }
    .btn {
      width: 100%;
      background-color: #248bda;
      color: #ffffff;
      border: none;
      border-radius: 14px;
      padding: 16px 24px;
      font-size: 17px;
      font-weight: 600;
      cursor: pointer;
      box-shadow: 0 4px 14px rgba(36, 139, 218, 0.35);
      transition: transform 0.1s ease, background-color 0.2s ease;
      text-decoration: none;
      display: block;
    }
    .btn:active {
      transform: scale(0.98);
      background-color: #1c74b4;
    }
  </style>
</head>
<body>

  <div class="container">
    <div class="icon">🚀</div>
    <h2 id="titleText">Open Bot</h2>
    <p id="descText">Tap the button below to launch the bot directly with your referral link.</p>
    
    <button id="launchBtn" class="btn">🚀 Open Bot Now</button>
  </div>

  <script>
    // 1. Initialize Telegram WebApp SDK safely
    if (window.Telegram && window.Telegram.WebApp) {
      try {
        window.Telegram.WebApp.ready();
        window.Telegram.WebApp.expand();
      } catch(e) {}
    }

    // 2. Safely parse target link parameter from URL
    function getTargetUrl() {
      const search = window.location.search;
      if (!search) return null;
      
      let raw = null;
      if (search.includes('link=')) {
        raw = search.substring(search.indexOf('link=') + 5);
      } else if (search.includes('url=')) {
        raw = search.substring(search.indexOf('url=') + 4);
      }
      
      if (!raw) return null;
      
      let decoded = decodeURIComponent(raw);
      if (!decoded.startsWith('http://') && !decoded.startsWith('https://') && !decoded.startsWith('tg://')) {
        decoded = 'https://' + decoded;
      }
      return decoded;
    }

    const targetUrl = getTargetUrl();
    const launchBtn = document.getElementById('launchBtn');

    if (targetUrl) {
      // 3. User Touch Handler (Physical click unlocks Telegram permissions)
      launchBtn.addEventListener('click', function() {
        if (window.Telegram && window.Telegram.WebApp && window.Telegram.WebApp.openTelegramLink) {
          try {
            window.Telegram.WebApp.openTelegramLink(targetUrl);
          } catch(err) {
            window.location.href = targetUrl;
          }
        } else {
          window.location.href = targetUrl;
        }
      });
    } else {
      document.getElementById('titleText').innerText = 'No Link Provided';
      document.getElementById('descText').innerText = 'Missing target referral link.';
      launchBtn.style.display = 'none';
    }
  </script>
</body>
</html>
