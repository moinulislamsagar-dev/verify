<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Device Verification</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #181818;
            color: #ffffff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            text-align: center;
            padding: 20px;
        }
        h3 {
            margin-bottom: 10px;
            font-size: 22px;
        }
        p {
            color: #aaaaaa;
            font-size: 14px;
            line-height: 1.5;
            margin-bottom: 30px;
        }
        .btn {
            background-color: #0088cc;
            color: white;
            border: none;
            padding: 14px 28px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 10px;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0, 136, 204, 0.4);
            transition: all 0.2s ease;
        }
        .btn:active {
            transform: scale(0.97);
        }
    </style>
</head>
<body>
    <h3>🔒 Hardware Security Check</h3>
    <p>To prevent multi-account spam and ensure platform safety, please click below to secure and verify your device hardware footprint.</p>
    
    <button class="btn" onclick="verifyDevice()">Verify My Device ✅</button>

    <script>
        Telegram.WebApp.ready();
        Telegram.WebApp.expand();

        function getHardwareFingerprint() {
            try {
                const canvas = document.createElement('canvas');
                const ctx = canvas.getContext('2d');
                ctx.textBaseline = "top";
                ctx.font = "14px 'Arial'";
                ctx.fillStyle = "#f60";
                ctx.fillRect(125, 1, 62, 20);
                ctx.fillStyle = "#069";
                ctx.fillText("FLEXI_FLASH_ANTI_CHEAT_2026", 2, 15);
                ctx.fillStyle = "rgba(102, 204, 0, 0.7)";
                ctx.fillText("FLEXI_FLASH_ANTI_CHEAT_2026", 4, 17);
                const dataUrl = canvas.toDataURL();
                
                let h = 5381;
                for (let i = 0; i < dataUrl.length; i++) {
                    h = ((h << 5) + h) + dataUrl.charCodeAt(i);
                    h &= 0xFFFFFFFF;
                }
                return "hw_" + Math.abs(h);
            } catch (e) {
                return "hw_fallback_" + Math.floor(Math.random() * 100000);
            }
        }

        function verifyDevice() {
            const fingerprint = getHardwareFingerprint();
            Telegram.WebApp.sendData(fingerprint);
        }
    </script>
</body>
</html>
