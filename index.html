<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Device Verification</title>
    <!-- Include Telegram WebApp JS library -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #181818;
            color: #ffffff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            text-align: center;
            padding: 20px;
        }
        h3 {
            margin-bottom: 10px;
            font-size: 22px;
        }
        p {
            color: #aaaaaa;
            font-size: 14px;
            line-height: 1.5;
            margin-bottom: 30px;
        }
        .btn {
            background-color: #0088cc;
            color: white;
            border: none;
            padding: 14px 28px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 10px;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0, 136, 204, 0.4);
            transition: all 0.2s ease;
        }
        .btn:active {
            transform: scale(0.97);
        }
    </style>
</head>
<body>
    <h3>🔒 Hardware Security Check</h3>
    <p>To prevent multi-account spam and ensure platform safety, please click below to secure and verify your device hardware footprint.</p>
    
    <button class="btn" onclick="verifyDevice()">Verify My Device ✅</button>

    <script>
        Telegram.WebApp.ready();
        Telegram.WebApp.expand();

        function getCookie(name) {
            let matches = document.cookie.match(new RegExp(
                "(?:^|; )" + name.replace(/([\.$?*|{}\(\)\[\]\\\/\+^])/g, '\\$1') + "=([^;]*)"
            ));
            return matches ? decodeURIComponent(matches[1]) : undefined;
        }

        function setCookie(name, value, days) {
            let d = new Date();
            d.setTime(d.getTime() + (days * 24 * 60 * 60 * 1000));
            let expires = "expires=" + d.toUTCString();
            document.cookie = name + "=" + encodeURIComponent(value) + ";" + expires + ";path=/;SameSite=Lax;Secure";
        }

        function generateUUID() {
            const chars = '0123456789abcdefghijklmnopqrstuvwxyzABCDEFGHIJKLMNOPQRSTUVWXYZ';
            let result = '';
            for (let i = 0; i < 32; i++) {
                result += chars[Math.floor(Math.random() * chars.length)];
            }
            return "dev_" + result;
        }

        function getPersistentDeviceID() {
            let deviceId = null;
            
            // Safe try-catch wrapper to handle blocked storage/cookie settings
            try {
                deviceId = localStorage.getItem("tbc_device_id");
                if (!deviceId || deviceId === "null" || deviceId === "undefined") {
                    deviceId = getCookie("tbc_device_id");
                }
            } catch (e) {
                deviceId = null;
            }
            
            // If empty, generate a unique dynamic session ID
            if (!deviceId || deviceId === "null" || deviceId === "undefined") {
                deviceId = generateUUID();
                try {
                    localStorage.setItem("tbc_device_id", deviceId);
                    setCookie("tbc_device_id", deviceId, 3650); // 10 years
                } catch (e) {
                    // Safe fallback if the browser completely blocks storage access
                }
            } else {
                try {
                    localStorage.setItem("tbc_device_id", deviceId);
                    setCookie("tbc_device_id", deviceId, 3650);
                } catch (e) {}
            }
            
            return "hw_" + deviceId;
        }

        function verifyDevice() {
            const fingerprint = getPersistentDeviceID();
            Telegram.WebApp.sendData(fingerprint);
        }
    </script>
</body>
</html>
